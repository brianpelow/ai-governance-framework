name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f AI-GOVERNANCE.md || exit 1
          test -f README.md || exit 1
          echo 'All required files present'
